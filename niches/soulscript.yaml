name: soulscript
display_name: "SoulScript"
description: "Psychological deep-dives into human connection, the unconscious mind, and archetypal relationships with immersive ASMR-style environmental textures."

script:
  tone: "empathetic, introspective, deeply analytical, philosophical, slightly mysterious"
  pacing: "slow"
  word_count: "135 to 150"
  hooks:
    - id: archetype_reveal
      template: "You think you chose your partner, but your unconscious did. Here is why."
      when: "explaining hidden relationship dynamics or the Anima/Animus"
    - id: shadow_work
      template: "The trait that annoys you most in your partner is actually a hidden part of yourself."
      when: "discussing shadow projection in relationships"
    - id: quote_drop
      template: "Carl Jung warned us that until you make the unconscious conscious, it will direct your life and you will call it fate."
      when: "introducing a deep psychological theory"
  cta_variants:
    - "Make the unconscious conscious. Follow SoulScript."
    - "Explore your shadow with us. Subscribe."
  forbidden_phrases:
    - "like and subscribe"
    - "smash that bell"
    - "hey guys"
    - "crazy facts"
    - "number one reason"
  structure:
    opening: "Introspective, thought-provoking hook in the first 3 seconds."
    middle: "Explain the psychological theory (e.g., projection, archetypes) using a real-world relationship example."
    closing: "A profound, reflective takeaway and a calm CTA."

visuals:
  settings_pool:
    - "A quiet, snowy, grey street"
    - "Watching someone leave through heavy rain"
    - "A peaceful sunrise or dawn from an interior view"
    - "A steaming cup on a table in a cold winter setting"
  style: "cinematic surrealism, psychological noir, dreamlike, symbolic"
  prompt_suffix: "moody atmospheric environment, deep indigo and alchemical gold palette, archetypal symbolism, deep shadows, cinematic lighting, mirror reflections, 8k resolution, highly detailed"
  # character_ref: "assets/soulscript_avatar.jpg" 

voice:
  suggested_voices:
    edge_tts:
      en: "en-US-ChristopherNeural"

captions:
  highlight_color: "#FFD700" # Alchemical Gold
  words_per_group: 2 # Shorter word bursts for a calmer, slower reading pace

music:
  model_id: "lyria-3-pro-preview"
  output_format: "audio/wav"
  prompt: >
    [ENVIRONMENT]: Immersive atmospheric weather (rain hitting a window or quiet winter wind), consistent binaural texture throughout.
    [GENRE]: Cinematic Healing Ambient.
    [INSTRUMENTS]: Minimalist felt piano, soft cello swells.
    [STRUCTURE]: 
    Intro: Only atmospheric weather sounds for 3 seconds.
    Main: Slow, melancholic piano melody (70 BPM) layered over the atmosphere. 
    Outro: Piano fades out, leaving only the sound of the weather.

audio_mixing:
  duck_volume_speech: 0.08 # Rain/Music stays quiet while the narrator speaks
  duck_volume_gap: 0.40 # Rain/Music swells up significantly during pauses to create ASMR atmosphere

thumbnail:
  style: "surreal aesthetic, golden ratio composition, minimal text"
  max_words: 4

discovery:
  reddit:
    subreddits: ["psychology", "relationships", "JungianTypology", "ShadowWork", "Jung"]
