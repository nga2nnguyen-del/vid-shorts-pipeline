name: soulscript
display_name: "SoulScript"
description: "Psychological deep-dives into human connection, the unconscious mind, and archetypal relationships with immersive ASMR-style environmental textures."

script:
  tone: "empathetic, introspective, deeply analytical, philosophical, slightly mysterious"
  pacing: "slow"
  word_count: "135 to 150"
  hooks:
    - id: archetype_reveal
      template: "You think you chose your partner, but your unconscious did. Here is why."
      when: "explaining hidden relationship dynamics or the Anima/Animus"
    - id: shadow_work
      template: "The trait that annoys you most in your partner is actually a hidden part of yourself."
      when: "discussing shadow projection in relationships"
    - id: quote_drop
      template: "Carl Jung warned us that until you make the unconscious conscious, it will direct your life and you will call it fate."
      when: "introducing a deep psychological theory"
  cta_variants:
    - "Make the unconscious conscious. Follow SoulScript."
    - "Explore your shadow with us. Subscribe."
  forbidden_phrases:
    - "like and subscribe"
    - "smash that bell"
    - "hey guys"
    - "crazy facts"
    - "number one reason"
  structure:
    opening: "Introspective, thought-provoking hook in the first 3 seconds."
    middle: "Explain the psychological theory (e.g., projection, archetypes) using a real-world relationship example."
    closing: "A profound, reflective takeaway and a calm CTA."

visuals:
  context: "Modern environment, houses, streets, train stations"
  character_rules:
    - "No closeup faces"
    - "In modern clothes"
  scene_effects:
    - "Color grading and subtle lighting effects"
    - "Seamless transitions"
    - "Slow motion"
  style: "A half-detailed graphite pencil sketch and traditional art illustration on clean white paper, featuring mostly monochrome linework with sparse, subtle color accents (about 10% coloring). This style uses visible, hand-drawn strokes with expressive, rough, and unblended hatched shading. The overall aesthetic is raw and evocative of traditional sketchbook art—primarily black and white, but punctuated by delicate, selective touches of color against a plain, void background."
  # I moved your character rules into the suffix to force the AI to obey them!
  prompt_suffix: "9:16 ratio, graphite pencil sketch on white paper, 10 percent color accents, modern clothes, NO closeup faces, archetypal symbolism, highly detailed, raw sketchbook aesthetic"
  # character_ref: "assets/soulscript_avatar.jpg" 

voice:
  suggested_voices:
    edge_tts:
      en: "en-US-AriaNeural" # Warm, sharing, empathetic female voice

captions:
  highlight_color: "#FFD700" # Alchemical Gold (will pop beautifully against the black/white sketches!)
  words_per_group: 2 

music:
  model_id: "lyria-3-pro-preview"
  output_format: "audio/wav"
  prompt: "Cinematic Healing Ambient. Immersive atmospheric weather (heavy rain or winter wind) paired with minimalist felt piano and soft cello swells."

audio_mixing:
  duck_volume_speech: 0.08 
  duck_volume_gap: 0.40 

thumbnail:
  style: "sketchbook aesthetic, 10% color accent, golden ratio composition, minimal text"
  max_words: 4

discovery:
  reddit:
    subreddits: ["psychology", "relationships", "JungianTypology", "ShadowWork", "Jung"]
